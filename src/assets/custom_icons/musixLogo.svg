<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- گرادیان رنگی نئون -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#ff00aa" />
      <stop offset="50%" stopColor="#00eeff" />
      <stop offset="100%" stopColor="#9d00ff" />
    </linearGradient>

    <!-- فیلتر درخشش -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" /> <!-- تکرار برای درخشش بیشتر در سایز کوچک -->
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(0, 4)">
    <!-- لایه هاله رنگی زیرین حرف M -->
    <path 
      d="M 14 48 L 14 16 L 32 32 L 50 16 L 50 48" 
      fill="none" 
      stroke="url(#neonGradient)" 
      stroke-width="8" 
      stroke-linejoin="round" 
      stroke-linecap="round" 
      filter="url(#glow)" 
    />
    
    <!-- لایه هسته سفید رنگ حرف M -->
    <path 
      d="M 14 48 L 14 16 L 32 32 L 50 16 L 50 48" 
      fill="none" 
      stroke="#ffffff" 
      stroke-width="2" 
      stroke-linejoin="round" 
      stroke-linecap="round" 
    />
  </g>
</svg>
